                if (data) {

                        id: key,
                        ...data[key]
                    }));
                } else {
                    // ប្រសិនបើក្នុង Firebase មិនទាន់មានទិន្នន័យសោះ វានឹងរុញទិន្នន័យគំរូចូលដំបូង

                    defaultFoods.forEach(item => {
                        foodsRef.child(item.id).set(item);
                    });
                }
                renderMenu();
                updateCartUI();
            });

            applyLanguage();
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `khmer-font px-4 py-3 rounded-xl shadow-lg border text-sm font-semibold flex items-center space-x-2 pointer-events-auto transition duration-300 transform translate-y-2 opacity-0`;
            
            if (type === 'success') {
                toast.className += ' bg-zinc-900 border-green-500/30 text-green-400';
                toast.innerHTML = `<i class="fa-solid fa-circle-check text-green-500"></i> <span>${message}</span>`;
            } else if (type === 'error') {
                toast.className += ' bg-zinc-900 border-red-500/30 text-red-400';
                toast.innerHTML = `<i class="fa-solid fa-circle-exclamation text-red-500"></i> <span>${message}</span>`;
            } else {
                toast.className += ' bg-zinc-900 border-amber-500/30 text-amber-500';
                toast.innerHTML = `<i class="fa-solid fa-circle-info text-amber-500"></i> <span>${message}</span>`;
            }

            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3200);
        }

        function formatPrice(usdPrice) {
            if (window.currentLang === 'kh') {
                const rielPrice = Math.round(usdPrice * EXCHANGE_RATE);
                return rielPrice.toLocaleString('km-KH') + ' ៛';
            } else {
                return '$' + usdPrice.toFixed(2);
            }
        }

            const activeBtn = document.getElementById(`cat-${category}`);
            if (activeBtn) {
                activeBtn.className = "khmer-font px-5 py-2 bg-amber-500 text-black font-bold text-sm rounded-xl whitespace-nowrap transition duration-300 category-btn";
            }

            renderMenu();
        };

                const matchesSearch = nameInKh.includes(window.searchQuery) || nameInEn.includes(window.searchQuery);
                return matchesCategory && matchesSearch;
            });

                            <button onclick="openEditFormModal('${item.id}')" class="khmer-font flex items-center space-x-1 bg-amber-500 hover:bg-amber-600 text-black px-2.5 py-1.5 rounded-lg text-[10px] font-bold transition-all">
                                <i class="fa-solid fa-pen-to-square text-[9px]"></i>
                                <span>${window.currentLang === 'kh' ? 'កែប្រែ' : 'Edit'}</span>
                            </button>
                            <button onclick="deleteFoodItem('${item.id}')" class="khmer-font flex items-center space-x-1 bg-red-600 hover:bg-red-700 text-white px-2.5 py-1.5 rounded-lg text-[10px] font-bold transition-all">
                                <i class="fa-solid fa-trash-can text-[9px]"></i>
                                <span>${window.currentLang === 'kh' ? 'លុប' : 'Delete'}</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="p-3 flex-grow flex flex-col justify-between">
                        <div>
                            <div class="mb-1">
                                <h4 class="khmer-font text-xs font-bold text-white group-hover:text-amber-400 transition-colors duration-200 line-clamp-1">${displayName}</h4>
                                <h5 class="text-[9px] text-gray-500 font-medium truncate">${secondaryName}</h5>
                            </div>
                            <p class="khmer-font text-[10px] text-gray-400 leading-relaxed line-clamp-1 mt-0.5 mb-2">${displayDesc || (window.currentLang === 'kh' ? 'មិនទាន់មានការពិពណ៌នាឡើយ' : 'No description provided')}</p>
                        </div>
                        
                        <div class="flex items-center justify-between border-t border-zinc-850 pt-2 mt-auto">
                            <span class="text-[9px] font-semibold text-gray-500">${displayUnit}</span>
                            <button onclick="addToCart('${item.id}')" class="khmer-font bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-black font-bold text-[9px] px-2 py-1.5 rounded-lg shadow-sm flex items-center space-x-1 transition duration-300">
                                <i class="fa-solid fa-plus text-[8px]"></i>
                                <span>${displayAddButtonText}</span>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.openAdminModal = function() {
            if (window.isAdmin) {
                showToast(window.currentLang === 'kh' ? "លោកអ្នកកំពុងប្រើប្រាស់ Admin Mode រួចរាល់ហើយ。" : "Already in Admin Mode.", "info");
                return;
            }
            document.getElementById('admin-pin').value = '';
            document.getElementById('admin-login-modal').classList.remove('hidden');
            document.getElementById('admin-pin').focus();
        };

        window.closeAdminModal = function() {
            document.getElementById('admin-login-modal').classList.add('hidden');
        };

        window.verifyAdminPIN = function() {
            const enteredPIN = document.getElementById('admin-pin').value;
            if (enteredPIN === '1234') {
                window.isAdmin = true;
                
                document.getElementById('admin-lock-btn').classList.add('hidden');
                document.getElementById('admin-badge').classList.remove('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
                
                closeAdminModal();
                showToast(i18n[window.currentLang].toastAdminSuccess, "success");
                renderMenu();
            } else {
                showToast(i18n[window.currentLang].toastAdminError, "error");
            }
        };

        window.logoutAdmin = function() {
            window.isAdmin = false;
            document.getElementById('admin-lock-btn').classList.remove('hidden');
            document.getElementById('admin-badge').classList.add('hidden');
            document.getElementById('admin-controls').classList.add('hidden');
            
            showToast(i18n[window.currentLang].toastAdminLogout, "info");
            renderMenu();
        };

        window.openFoodFormModal = function() {
            document.getElementById('form-modal-title').innerText = i18n[window.currentLang].addFoodTitle;
            document.getElementById('edit-item-id').value = '';
            document.getElementById('food-name-kh').value = '';
            document.getElementById('food-name-en').value = '';
            document.getElementById('food-price').value = '';
            document.getElementById('food-category').value = 'food';
            document.getElementById('food-image').value = '';
            document.getElementById('food-desc-kh').value = '';
            document.getElementById('food-desc-en').value = '';
            document.getElementById('food-form-modal').classList.remove('hidden');
        };

        window.openEditFormModal = function(id) {
            const item = window.foods.find(f => f.id === id);
            if (!item) return;

            document.getElementById('form-modal-title').innerText = i18n[window.currentLang].editFoodTitle;
            document.getElementById('edit-item-id').value = item.id;
            document.getElementById('food-name-kh').value = item.nameKh;
            document.getElementById('food-name-en').value = item.nameEn;
            document.getElementById('food-price').value = item.price;
            document.getElementById('food-category').value = item.category;
            document.getElementById('food-image').value = item.image;
            document.getElementById('food-desc-kh').value = item.descKh || '';
            document.getElementById('food-desc-en').value = item.descEn || '';
            document.getElementById('food-form-modal').classList.remove('hidden');
        };

        window.closeFoodFormModal = function() {
            document.getElementById('food-form-modal').classList.add('hidden');
        };

        window.setImagePreset = function(presetKey) {
            if (IMAGE_PRESETS[presetKey]) {
                document.getElementById('food-image').value = IMAGE_PRESETS[presetKey];
                showToast(window.currentLang === 'kh' ? `បានជ្រើសរើសរូបភាព៖ ${presetKey}` : `Selected preset image: ${presetKey}`, "info");
            }
        };

        window.saveFoodItem = function() {
            const id = document.getElementById('edit-item-id').value;
            const nameKh = document.getElementById('food-name-kh').value.trim();
            const nameEn = document.getElementById('food-name-en').value.trim();
            const price = parseFloat(document.getElementById('food-price').value);
            const category = document.getElementById('food-category').value;
            let image = document.getElementById('food-image').value.trim();
            const descKh = document.getElementById('food-desc-kh').value.trim();
            const descEn = document.getElementById('food-desc-en').value.trim();

            if (!nameKh || !nameEn || isNaN(price) || price <= 0) {
                showToast(window.currentLang === 'kh' ? "សូមបំពេញព័ត៌មានសំខាន់ៗឱ្យបានគ្រប់គ្រាន់!" : "Please fill in all required fields properly!", "error");
                return;
            }

            if (!image) {
                image = IMAGE_PRESETS['default'];
            }

            const itemId = id || 'food_' + Date.now();
            const payload = { id: itemId, nameKh, nameEn, price, category, image, descKh, descEn };

            // រក្សាទុកទៅកាន់ Firebase Cloud Database ផ្ទាល់
            foodsRef.child(itemId).set(payload)
                .then(() => {
                    closeFoodFormModal();
                    showToast(i18n[window.currentLang].toastSaveSuccess, "success");
                })
                .catch((error) => {
                    showToast("Error: " + error.message, "error");
                });
        };

        window.deleteFoodItem = function(id) {
            window.itemToDeleteId = id;
            const t = i18n[window.currentLang];
            
            document.getElementById('delete-modal-title').innerText = window.currentLang === 'kh' ? 'បញ្ជាក់ការលុប' : 'Confirm Deletion';
            document.getElementById('delete-modal-desc').innerText = t.confirmDelete;
            document.getElementById('delete-cancel-btn').innerText = t.cancel;
            document.getElementById('delete-confirm-btn').innerText = window.currentLang === 'kh' ? 'លុបចេញ' : 'Delete';
            
            document.getElementById('delete-confirm-modal').classList.remove('hidden');
        };

        window.closeDeleteModal = function() {
            document.getElementById('delete-confirm-modal').classList.add('hidden');
            window.itemToDeleteId = null;
        };

        window.confirmDeleteFoodItem = function() {
            if (window.itemToDeleteId) {
                // លុបចេញពី Firebase Realtime Database ផ្ទាល់
                foodsRef.child(window.itemToDeleteId).remove()
                    .then(() => {
                        window.cart = window.cart.filter(c => c.id !== window.itemToDeleteId);
                        showToast(i18n[window.currentLang].toastDeleteSuccess, "success");
                    })
                    .catch((error) => {
                        showToast("Error: " + error.message, "error");
                    });
            }
            closeDeleteModal();
        };

        window.toggleCart = function() {
            const drawer = document.getElementById('cart-drawer');
            drawer.classList.toggle('translate-x-full');
        };

        window.addToCart = function(itemId) {
            const existing = window.cart.find(c => c.id === itemId);
            if (existing) {
                existing.quantity += 1;
            } else {
                window.cart.push({ id: itemId, quantity: 1 });
            }

            updateCartUI();
            
            const foodItem = window.foods.find(f => f.id === itemId);
            if (foodItem) {
                const itemName = window.currentLang === 'kh' ? foodItem.nameKh : foodItem.nameEn;
                showToast(window.currentLang === 'kh' ? `បានបញ្ចូល ${itemName} ទៅក្នុងកន្ត្រក។` : `Added ${itemName} to your basket.`, "success");
            }
        };

        window.updateQuantity = function(itemId, amount) {
            const item = window.cart.find(c => c.id === itemId);
            if (!item) return;

            item.quantity += amount;
            if (item.quantity <= 0) {
                window.cart = window.cart.filter(c => c.id !== itemId);
            }
            updateCartUI();
        };

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');

            cartItemsContainer.innerHTML = '';

            let total = 0;
            let count = 0;

            if (window.cart.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="h-60 flex flex-col items-center justify-center text-center animate-fade-in">
                        <i class="fa-solid fa-basket-shopping text-gray-700 text-4xl mb-3"></i>
                        <p class="khmer-font text-gray-400 text-sm">${i18n[window.currentLang].cartEmpty}</p>
                    </div>
                `;
            } else {
                window.cart.forEach(cartItem => {
                    const item = window.foods.find(f => f.id === cartItem.id);
                    if (!item) return;

                    const itemSubtotal = item.price * cartItem.quantity;
                    total += itemSubtotal;
                    count += cartItem.quantity;

                    const displayName = window.currentLang === 'kh' ? item.nameKh : item.nameEn;

                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center bg-zinc-900 border border-zinc-850 p-4 rounded-xl animate-fade-in";
                    div.innerHTML = `
                        <div class="space-y-1 pr-2">
                            <h5 class="khmer-font text-xs font-bold text-white line-clamp-1">${displayName}</h5>
                            <span class="text-xs text-amber-500 font-semibold">${formatPrice(item.price)}</span>
                        </div>
                        <div class="flex items-center space-x-3">
                            <div class="flex items-center space-x-2 bg-zinc-950 px-2 py-1.5 rounded-lg border border-zinc-850">
                                <button onclick="updateQuantity('${item.id}', -1)" class="text-gray-400 hover:text-red-500 w-5 h-5 flex items-center justify-center text-sm font-bold"><i class="fa-solid fa-minus text-[10px]"></i></button>
                                <span class="text-xs text-white font-bold w-4 text-center">${cartItem.quantity}</span>
                                <button onclick="updateQuantity('${item.id}', 1)" class="text-gray-400 hover:text-green-500 w-5 h-5 flex items-center justify-center text-sm font-bold"><i class="fa-solid fa-plus text-[10px]"></i></button>
                            </div>
                            <span class="text-xs font-bold text-white w-16 text-right">${formatPrice(itemSubtotal)}</span>
                        </div>
                    `;
                    cartItemsContainer.appendChild(div);
                });
            }

            cartTotal.innerText = formatPrice(total);
            
            if (count > 0) {
                cartCount.innerText = count;
                cartCount.classList.remove('hidden');
            } else {
                cartCount.classList.add('hidden');
            }
        }

        window.checkoutToWhatsApp = function() {
            if (window.cart.length === 0) {
                showToast(i18n[window.currentLang].toastNoItemsInCart, "error");
                return;
            }

            let message = window.currentLang === 'kh' 
                ? "សួស្ដី RM HENG RESTO! ខ្ញុំចង់កម្ម៉ង់ម្ហូបដូចខាងក្រោម៖\n"
                : "Hello RM HENG RESTO! I would like to order the following:\n";
            
            message += "=============================\n";
            
            let total = 0;
            window.cart.forEach((cartItem, index) => {
                const item = window.foods.find(f => f.id === itemId || f.id === cartItem.id);
                if (!item) return;

                const usdSubtotal = item.price * cartItem.quantity;
                total += usdSubtotal;

                const displayName = window.currentLang === 'kh' ? item.nameKh : item.nameEn;
                const formattedSubtotal = formatPrice(usdSubtotal);

                message += `${index + 1}. ${displayName} x ${cartItem.quantity} = ${formattedSubtotal}\n`;
            });
            
            message += "=============================\n";
            message += window.currentLang === 'kh' 
                ? `សរុបទាំងអស់ (Total): ${formatPrice(total)}\n\n`
                : `Total Sum: ${formatPrice(total)}\n\n`;
            
            message += window.currentLang === 'kh'
                ? "សូមអរគុណ! (ផ្ញើចេញពីទំព័រមេនុយឌីជីថល)"
                : "Thank you! (Sent via digital menu website)";

            const encodedMessage = encodeURIComponent(message);
            const whatsappURL = `https://wa.me/85590878980?text=${encodedMessage}`;
            
            window.open(whatsappURL, '_blank');

            window.cart = [];
            updateCartUI();
            
            toggleCart();
            showToast(i18n[window.currentLang].toastCheckoutSuccess, "success");
        };
    </script>
</body>
</html>
